<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ateliers Bureautique</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #19212a;
      --muted: #5d6673;
      --line: #d9dee6;
      --paper: #f7f4ef;
      --panel: #ffffff;
      --word: #285aa8;
      --excel: #217a4b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.5;
    }

    .atelier-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 32px;
    }

    .atelier-link {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 180px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      background: var(--panel);
    }

    .atelier-link:focus,
    .atelier-link:hover {
      outline: 3px solid rgba(25, 33, 42, 0.16);
      outline-offset: 3px;
    }

    .atelier-name {
      display: block;
      font-size: 1.7rem;
      font-weight: 700;
    }

    .atelier-head {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .atelier-logo {
      flex: 0 0 64px;
      width: 64px;
      height: 64px;
    }

    .atelier-logo svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .atelier-logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .atelier-copy {
      display: grid;
      gap: 10px;
    }

    .atelier-word {
      border-top: 5px solid var(--word);
    }

    .atelier-excel {
      border-top: 5px solid var(--excel);
    }

    @media (max-width: 680px) {
      main {
        padding-top: 32px;
      }

      .atelier-list {
        grid-template-columns: 1fr;
      }

      .atelier-head {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Ateliers Bureautique</h1>
      <p>Choisissez l'atelier a ouvrir.</p>
    </header>

    <nav class="atelier-list" aria-label="Ateliers disponibles">
      <a class="atelier-link atelier-word" href="word/">
        <div class="atelier-head">
          <span class="atelier-logo" aria-hidden="true">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Microsoft%20Office%20Word%20%282025%E2%80%93present%29.svg" alt="">
          </span>
          <div class="atelier-copy">
            <span class="atelier-name">Word</span>
            <p>Exercices de traitement de texte, mise en page et documents longs.</p>
          </div>
        </div>
      </a>
      <a class="atelier-link atelier-excel" href="excel/">
        <div class="atelier-head">
          <span class="atelier-logo" aria-hidden="true">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Microsoft%20Office%20Excel%20%282025%E2%80%93present%29.svg" alt="">
          </span>
          <div class="atelier-copy">
            <span class="atelier-name">Excel</span>
            <p>Exercices de tableur, calculs, graphiques et mise en forme.</p>
          </div>
        </div>
      </a>
    </nav>
  </main>
</body>
</html>
