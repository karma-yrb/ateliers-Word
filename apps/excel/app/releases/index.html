<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atelier Excel - Releases</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1eb;
      --panel: #ffffff;
      --line: #d9d2c7;
      --ink: #1f2c39;
      --muted: #5b6877;
      --accent: #2e6f76;
      --high: #a04f4f;
      --medium: #8b6b4a;
      --low: #2f7a56;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 90% 0%, #e2ecef 0%, transparent 42%), var(--bg);
      color: var(--ink);
      font-family: "Nunito", "Segoe UI", sans-serif;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px 16px 36px; }
    .hero {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }
    h1 {
      margin: 0;
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 2rem;
    }
    .subtitle { margin: 8px 0 0; color: var(--muted); }
    .actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: 2px solid var(--line);
      background: #fff;
      color: #2f4354;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .list { margin-top: 16px; display: grid; gap: 12px; }
    .card {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }
    .top { display: flex; flex-wrap: wrap; align-items: baseline; justify-content: space-between; gap: 10px; }
    .tag { font-size: .86rem; color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 10px;
      font-size: .8rem;
      font-weight: 800;
      border: 1px solid transparent;
    }
    .pill.high { color: #6d1f1f; background: #f8e9e9; border-color: #e8c9c9; }
    .pill.medium { color: #6a4b2f; background: #f8f0e5; border-color: #e7d5ba; }
    .pill.low { color: #1f5a3d; background: #e7f3ec; border-color: #c9e4d5; }
    .meta { margin: 10px 0 0; color: var(--muted); }
    .counts {
      margin: 12px 0 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
    }
    .count {
      border: 1px solid #e5ddd1;
      border-radius: 10px;
      padding: 8px;
      background: #fffdfa;
      font-size: .88rem;
    }
    .elements {
      margin: 12px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 4px;
    }
    .empty { color: var(--muted); }
  </style>
  <script defer src="./releases.js"></script>
  <script defer>
    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function impactClass(level) {
      if (level === "high") return "high";
      if (level === "medium") return "medium";
      return "low";
    }

    function impactLabel(level) {
      if (level === "high") return "Impact élevé";
      if (level === "medium") return "Impact moyen";
      return "Impact faible";
    }

    function releaseTypeLabel(type) {
      if (type === "major") return "Majeure";
      if (type === "minor") return "Mineure";
      if (type === "patch") return "Corrective";
      return "Initiale";
    }

    function formatCount(label, value) {
      return `<div class="count"><strong>${escapeHtml(label)}</strong><br>${value}</div>`;
    }

    async function loadData() {
      if (window.RELEASES_DATA) return window.RELEASES_DATA;
      const response = await fetch("./releases.json", { cache: "no-store" });
      if (!response.ok) throw new Error("Impossible de charger releases.json");
      return response.json();
    }

    async function render() {
      const target = document.getElementById("release-list");
      try {
        const data = await loadData();
        const releases = Array.isArray(data.releases) ? data.releases : [];
        if (!releases.length) {
          target.innerHTML = `<p class="empty">Aucune release publiée pour le moment.</p>`;
          return;
        }

        target.innerHTML = releases.map((release) => {
          const level = release?.impact?.level || "low";
          const elements = Array.isArray(release.elements) ? release.elements : [];
          return `
            <article class="card">
              <div class="top">
                <h2 style="margin:0;">v${escapeHtml(release.version)} <span class="tag">(${escapeHtml(release.date || "")})</span></h2>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  <span class="pill ${impactClass(level)}">${impactLabel(level)}</span>
                  <span class="pill">${releaseTypeLabel(release.releaseType)}</span>
                </div>
              </div>
              <p class="meta">${escapeHtml(release.summary || "")}</p>
              <p class="meta">${escapeHtml(release?.impact?.rationale || "")}</p>
              <div class="counts">
                ${formatCount("Total commits", release?.counts?.total || 0)}
                ${formatCount("Features", release?.counts?.feat || 0)}
                ${formatCount("Fix", release?.counts?.fix || 0)}
                ${formatCount("Refactor", release?.counts?.refactor || 0)}
                ${formatCount("Perf", release?.counts?.perf || 0)}
                ${formatCount("Breaking", release?.counts?.breaking || 0)}
              </div>
              <h3 style="margin:14px 0 0;">Éléments livrés</h3>
              <ul class="elements">
                ${elements.length
                  ? elements.map((item) => `<li>${escapeHtml(item.typeLabel || item.type || "Autre")} - ${escapeHtml(item.description || "")} <span class="tag">(${escapeHtml(item.hash || "")})</span></li>`).join("")
                  : "<li>Aucun élément listé.</li>"}
              </ul>
            </article>
          `;
        }).join("");
      } catch (error) {
        target.innerHTML = `<p class="empty">Erreur de chargement des releases.</p>`;
      }
    }

    window.addEventListener("DOMContentLoaded", render);
  </script>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Releases Atelier Excel</h1>
      <p class="subtitle">Historique des versions avec résumé de type, impact et éléments livrés.</p>
      <div class="actions">
        <a class="btn" href="../index.html">Retour à l'application</a>
      </div>
    </section>
    <section id="release-list" class="list" aria-live="polite"></section>
  </main>
</body>
</html>
